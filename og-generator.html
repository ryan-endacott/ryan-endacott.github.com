<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap');
  * { margin: 0; padding: 0; }
  body { background: #000; }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0e3a5e 0%, #1a6fa0 45%, #0d7a5f 100%);
    font-family: 'Inter', -apple-system, sans-serif;
    color: white;
    position: relative;
  }
  .text { position: absolute; top: 50%; left: 80px; transform: translateY(-50%); }
  .name { font-size: 72px; font-weight: 700; letter-spacing: -2px; }
  .tagline { font-size: 24px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; margin-top: 16px; opacity: 0.9; }
</style>
</head><body>
<div class="card">
  <div class="text">
    <div class="name">Ryan Endacott</div>
    <div class="tagline">Tinker Hacker Builder Guy</div>
  </div>
</div>
</body></html>
