---
layout: default
---

<main class="content" role="main">

    <article class="post">

        <header>
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
	   <time datetime="{{ page.date | date:"%Y-%m-%d" }}">{{ page.date | date: "%B %-d, %Y" }}</time>
	</div>
        </header>

        <section class="post-content">
            {{ content }}
        </section>

        <section class="share">
            <p class="info">Share this post</p>
            <a href="https://x.com/intent/tweet?text={{ page.title | url_encode }}&url={{site.url}}{{ page.url }}"
                target="_blank" rel="noopener">Twitter</a>
        </section>

    </article>

</main>
